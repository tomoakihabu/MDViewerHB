<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MDViewerHB">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="Markdown Viewer & Editor — MDViewerHB">
    <title>MDViewerHB</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- CodeMirror 5 (stable CDN, no module issues) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/onedark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

    <!-- marked.js — Markdown parser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <!-- highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-style">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
<div id="app">

    <!-- Header -->
    <header class="glass" id="app-header">
        <div class="logo">
            <span class="logo-icon">✦</span>
            <span class="logo-text">MDViewerHB</span>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="テーマ切替">
                <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <button id="save-btn" class="icon-btn primary-btn" aria-label="保存">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
            </button>
            <button id="menu-btn" class="icon-btn" aria-label="メニュー">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="5" r="1" fill="currentColor"></circle>
                    <circle cx="12" cy="12" r="1" fill="currentColor"></circle>
                    <circle cx="12" cy="19" r="1" fill="currentColor"></circle>
                </svg>
            </button>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <div class="toolbar-inner">
            <button class="tool-btn" data-action="bold"          title="太字"><b>B</b></button>
            <button class="tool-btn" data-action="italic"        title="斜体"><i>I</i></button>
            <button class="tool-btn" data-action="strikethrough" title="打ち消し">S̶</button>
            <div class="tool-sep"></div>
            <button class="tool-btn" data-action="h1"            title="見出し1">H1</button>
            <button class="tool-btn" data-action="h2"            title="見出し2">H2</button>
            <button class="tool-btn" data-action="h3"            title="見出し3">H3</button>
            <div class="tool-sep"></div>
            <button class="tool-btn" data-action="ul"            title="箇条書き">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="9" y1="6" x2="21" y2="6"></line><line x1="9" y1="12" x2="21" y2="12"></line><line x1="9" y1="18" x2="21" y2="18"></line><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"></circle></svg>
            </button>
            <button class="tool-btn" data-action="ol"            title="番号付き">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4" stroke="currentColor" stroke-width="1.5" fill="none"></path><path d="M4 10h2" stroke="currentColor" stroke-width="1.5"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1.5" stroke="currentColor" stroke-width="1.5" fill="none"></path></svg>
            </button>
            <button class="tool-btn" data-action="task"          title="タスク">☑</button>
            <div class="tool-sep"></div>
            <button class="tool-btn" data-action="code"          title="コードブロック">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </button>
            <button class="tool-btn" data-action="link"          title="リンク">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </button>
            <button class="tool-btn" data-action="quote"         title="引用">❝</button>
            <button class="tool-btn" data-action="hr"            title="水平線">—</button>
        </div>
    </div>

    <!-- URL Bar -->
    <div id="url-bar" class="url-bar glass">
        <svg class="url-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
            id="url-input"
            type="url"
            placeholder="URLを入力してMarkdownを読み込む（Google Drive, GitHub など）"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        >
        <button id="url-load-btn" class="url-btn" aria-label="読み込む">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
        <span id="url-status" class="url-status"></span>
    </div>

    <!-- Main -->
    <main id="main-area">
        <div id="editor-pane" class="pane active">
            <textarea id="editor-textarea"></textarea>
        </div>
        <div id="resizer" class="resizer"></div>
        <div id="preview-pane" class="pane">
            <article id="preview-content" class="markdown-body"></article>
        </div>
    </main>

    <!-- Tab Bar (mobile) -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
            <span>編集</span>
        </button>
        <button class="tab-btn" id="tab-preview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <span>プレビュー</span>
        </button>
    </div>

    <!-- Footer -->
    <footer class="statusbar glass">
        <span id="char-count">0 文字</span>
        <span id="word-count">0 単語</span>
        <span class="spacer"></span>
        <span class="lang-badge">Markdown</span>
    </footer>

    <!-- Dropdown Menu -->
    <div id="menu-dropdown" class="dropdown glass" hidden>
        <button id="menu-new" class="menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            新規作成
        </button>
        <button id="menu-open" class="menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            ファイルを開く
        </button>
        <button id="menu-save-txt" class="menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline></svg>
            .md として保存
        </button>
        <button id="menu-export" class="menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            HTML でエクスポート
        </button>
    </div>

    <input type="file" id="file-input" accept=".md,.txt,.markdown" style="display:none">
</div><!-- #app -->

<script src="main.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
</script>
</body>
</html>
